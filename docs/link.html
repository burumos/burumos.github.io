<!DOCTYPE html>
<html>
  <head>
    <title>burumos's top page</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <script src="./js/link.js" defer></script>
    <script src="./js/alpine-sort.js" defer></script>
    <script src="./js/alpine-3.15.11.js" defer></script>
    <style>
      body {
        background-color: rgb(41, 41, 41);
        color: white
      }
      a {
        color: rgb(155, 171, 255);
      }
      .link-table {
        border-collapse: collapse;
      }
      .link-table th, .link-table td {
        border: 1px solid black;
        padding: 15px 10px 5px;
        max-width: 35vw;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .link-table .url-column {
        max-width: 100px;
      }
      .drag-cell {
        cursor: move;
        width: 20px;
      }
    </style>
  </head>
  <body>
    <div>
      <a href="./index.html">Top</a>
    </div>
    <h1>Links</h1>

    <section x-data="linkEx">
      <table class="link-table">
        <thead>
          <tr>
            <th>D</th>
            <th>Name</th>
            <th class="url-column">URL</th>
            <th>Date</th>
            <th>Button</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody x-sort="handleSort">
          <template x-for="link in links" :key="link.id">
            <tr x-sort:item="link.id">
              <td x-sort:handle class="drag-cell">@</td>
              <td>
                <a :href="link.url" target="_blank" rel="noopener noreferrer" x-text="link.name" @click="handleUpdate(link.id)"></a>
              </td>
              <td class="url-column">
                <a :href="link.url" target="_blank" rel="noopener noreferrer" x-text="link.url" @click="handleUpdate(link.id)"></a>
              </td>
              <td x-text="formatDate(link.updated_at)"></td>
              <td>
                <button x-on:click="handleUpdate(link.id)">Update</button>
              </td>
              <td>
                <button x-on:click="handleDelete(link.id)">Delete</button>
              </td>
            </tr>
          </template>
          <tr>
            <td></td>
            <td><input type="text" x-model="newLink.name"></td>
            <td><input type="text" x-model="newLink.url"></td>
            <td></td>
            <td><button x-on:click="handleAdd()">Add</button></td>
            <td></td>
          </tr>
        </tbody>
      </table>

      <div style="margin-top: 100px;">
        <a href="javascript:(function()%7Bconst url %3D window.location.href%3B%0Aconst title %3D document.title%3B%0Aconst href %3D %60https%3A%2F%2Fburumos.github.io%2Flink.html%3Fname%3D%24%7BencodeURIComponent(title)%7D%26url%3D%24%7BencodeURIComponent(url)%7D%60%3B%0Awindow.open(href%2C '_blank')%3B%7D)()%3B" onclick="return false;">bookmarklet</a>
      </div>
  </div>
    </section>
  </body>
</html>
